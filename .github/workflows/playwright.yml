name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: ["*"]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Get Cloudflare preview URL from PR comment
        id: preview
        if: github.event_name == 'pull_request'
        run: |
          echo "Fetching preview URL from Cloudflare bot comment..."

          # Poll for up to 2.5 minutes for the bot comment
          for attempt in {1..30}; do
            echo "🔍 Attempt $attempt/30: Checking for Cloudflare bot comment..."

            # Fetch PR comments
            COMMENTS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments")

            # Check if Cloudflare bot has commented
            BOT_COMMENT=$(echo "$COMMENTS" | jq -r '.[] | select(.user.login == "cloudflare-workers-and-pages[bot]") | .body' 2>/dev/null | head -1)

            if [ -n "$BOT_COMMENT" ]; then
              echo "📝 Found Cloudflare bot comment:"
              echo "$BOT_COMMENT"
              echo "---"

              # Check if deployment was successful
              if echo "$BOT_COMMENT" | grep -q "Deployment successful"; then
                # Extract preview URL from successful deployment (handles both plain URLs and markdown links)
                PREVIEW_URL=$(echo "$BOT_COMMENT" | grep -oP 'https://[a-zA-Z0-9-]+\.bitbybit-b3\.workers\.dev[^\s\)]*' | head -1)

                if [ -n "$PREVIEW_URL" ]; then
                  echo "✅ Deployment successful! Preview URL: $PREVIEW_URL"
                  echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
                  exit 0
                fi
              else
                echo "❌ Cloudflare deployment failed - bot comment found but no successful deployment"
                echo "url=" >> $GITHUB_OUTPUT
                exit 0
              fi
            fi

            if [ $attempt -lt 30 ]; then
              echo "⏳ Waiting 5s for Cloudflare bot to comment..."
              sleep 5
            fi
          done

          echo "❌ No Cloudflare bot comment found after 2.5 minutes"
          echo "url=" >> $GITHUB_OUTPUT

      - name: Set preview URL for non-PR runs
        id: preview-fallback
        if: github.event_name != 'pull_request'
        run: |
          echo "Not a PR, using production URL"
          echo "url=https://crow-landing-client.bitbybit-b3.workers.dev" >> $GITHUB_OUTPUT

      - name: Install Playwright browsers
        run: bun playwright install --with-deps

      - name: Determine test URL and start server if needed
        id: test-url
        run: |
          URL="${{ steps.preview.outputs.url || steps.preview-fallback.outputs.url }}"

          if [ -z "$URL" ]; then
            echo "No preview/production URL found, starting local dev server..."
            echo "use_local=true" >> $GITHUB_OUTPUT
            echo "url=http://localhost:3000" >> $GITHUB_OUTPUT

            # Build and start the server in the background
            bun run build
            bun run start &
            SERVER_PID=$!
            echo "server_pid=$SERVER_PID" >> $GITHUB_OUTPUT

            # Wait for server to be ready
            echo "Waiting for server to start..."
            for i in {1..30}; do
              if curl -s http://localhost:3000 > /dev/null 2>&1; then
                echo "✅ Server is ready!"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "❌ Server failed to start within 30 seconds"
                exit 1
              fi
              sleep 1
            done
          else
            echo "Using deployment URL: $URL"
            echo "use_local=false" >> $GITHUB_OUTPUT
            echo "url=$URL" >> $GITHUB_OUTPUT
          fi

      - name: Run Playwright tests
        run: bun playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.test-url.outputs.url }}

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
