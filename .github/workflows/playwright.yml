name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest
    - name: Install dependencies
      run: bun install
    - name: Get Cloudflare preview URL
      id: preview
      if: github.event_name == 'pull_request'
      run: |
        # Get PR number
        PR_NUMBER=${{ github.event.pull_request.number }}

        # Fetch PR comments and extract Cloudflare preview URL
        PREVIEW_URL=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
          | grep -o 'https://[^"]*\.crow-landing-client\.pages\.dev' \
          | head -1)

        # Fallback to branch-based URL if not found
        if [ -z "$PREVIEW_URL" ]; then
          BRANCH_NAME="${GITHUB_HEAD_REF:-main}"
          SANITIZED_BRANCH=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | tr '/' '-')
          PREVIEW_URL="https://${SANITIZED_BRANCH}.crow-landing-client.pages.dev"
        fi

        echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
        echo "Testing against: $PREVIEW_URL"
    - name: Install Playwright Browsers
      run: bun playwright install --with-deps
    - name: Run Playwright tests
      run: bun playwright test
      env:
        PLAYWRIGHT_TEST_BASE_URL: ${{ steps.preview.outputs.url || 'https://crow-landing-client.pages.dev' }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
