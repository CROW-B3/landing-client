name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    # 1. Set up Bun instead of Node
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
    # 2. Configure authentication for GitHub Packages (for @b3-crow/ui-kit)
    - name: Configure npm for GitHub Packages
      run: |
        echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGES_TOKEN }}" >> ~/.npmrc
        echo "@b3-crow:registry=https://npm.pkg.github.com" >> ~/.npmrc
    # 3. Install dependencies with bun (replacing pnpm)
    - name: Install dependencies
      run: bun install --frozen-lockfile
    # 4. Install Playwright browsers using bun
    - name: Install Playwright Browsers
      run: bunx playwright install --with-deps
    # 5. Run tests using bun
    - name: Run Playwright tests
      run: bunx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30