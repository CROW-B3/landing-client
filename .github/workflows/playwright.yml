name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: ["*"]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Get Cloudflare preview URL from PR comment
        id: preview
        if: github.event_name == 'pull_request'
        run: |
          echo "Fetching preview URL from Cloudflare bot comment..."

          # Poll for up to 2 minutes for the bot comment
          for attempt in {1..24}; do
            echo "🔍 Attempt $attempt/24: Checking for Cloudflare bot comment..."

            # Fetch PR comments
            COMMENTS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments")

            # Extract preview URL from Cloudflare bot comment
            PREVIEW_URL=$(echo "$COMMENTS" | jq -r '
              .[] |
              select(.user.login == "cloudflare-workers-and-pages[bot]") |
              .body |
              match("https://[a-z0-9-]+\\.bitbybit-b3\\.workers\\.dev/?") |
              .string
            ' 2>/dev/null | head -1)

            if [ -n "$PREVIEW_URL" ]; then
              echo "✅ Found preview URL in bot comment: $PREVIEW_URL"
              echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
              exit 0
            fi

            if [ $attempt -lt 24 ]; then
              echo "⏳ Waiting 5s for Cloudflare bot to comment..."
              sleep 5
            fi
          done

          echo "❌ No preview URL found after 2 minutes"
          echo "url=" >> $GITHUB_OUTPUT

      - name: Set preview URL for non-PR runs
        id: preview-fallback
        if: github.event_name != 'pull_request'
        run: |
          echo "Not a PR, using production URL"
          echo "url=https://crow-landing-client.bitbybit-b3.workers.dev" >> $GITHUB_OUTPUT

      - name: Install Playwright browsers
        run: bun playwright install --with-deps

      - name: Run Playwright tests
        run: bun playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.url || steps.preview-fallback.outputs.url || 'http://localhost:3000' }}

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
